; PlatformIO project for smalltv-mod (SmallTV-ultra, ESP8266 only)
; Three build targets, all a 1.54" 240x240 ST7789 IPS display:
;   env:smalltv_ultra        GeekMagic SmallTV-ultra,  ESP-12F (ESP8266)
;   env:smalltv_ultra_loader minimal OTA loader (src/loader.cpp) for the same
;   env:clock_usb            USB-only custom clock for this hardware revision
;
; Build one:       pio run -e smalltv_ultra  /  pio run -e smalltv_ultra_loader  /  pio run -e clock_usb
; Build artifact:  .pio/build/<env>/firmware.bin
; Flash via USB:   pio run -e <env> -t upload
; Flash via OTA:   upload firmware.bin through the device web UI (Update tab)
;
; License: WTFPL

[platformio]
default_envs = smalltv_ultra

[env:smalltv_ultra]
platform = espressif8266
board = esp12e
framework = arduino
build_src_filter = +<*> -<usb_clock.cpp>

; ESP-12F on the SmallTV carries 4MB flash. Layout: 1MB LittleFS, rest for
; sketch + OTA (OTA needs room for two sketch copies).
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld

monitor_speed = 115200
upload_speed = 921600

; Low-memory lwIP variant leaves more heap for BearSSL (HTTPS) + the framebuffer-less
; display rendering. Bandwidth is irrelevant for the tiny JSON payloads we fetch.
; Full BearSSL (no BEARSSL_SSL_BASIC) so cash.ch's ECDHE-only CDN is reachable.
; The EC handshake is heavy on this chip, so the cost is contained: it's pinned
; to P-256 (BearSslTuning.cpp), only the cash.ch fetch offers ECDHE while Yahoo
; and the GitHub source are forced to the cheap static-RSA suites, the cash
; connection uses 512-byte buffers + TLS session resumption, and a fetch is
; skipped unless a large enough contiguous heap block is free.
build_flags =
	-D SMALLTV_ESP8266
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
	-D ARDUINOJSON_USE_DOUBLE=0

; Derive FW_VERSION from `git describe --tags` at build time so a tag and the
; binary's embedded version can never drift (the v3.0.1/v3.0.2 bug).
extra_scripts = pre:tools/gen_version.py

; Feature folders on the include path so cross-module quote-includes resolve.
; These MUST be build_src_flags (project sources only), not build_flags — a global
; -Isrc leaks into the framework build and, on the ESP32 IDF, shadows internal
; headers like net.h/config.h (case-insensitively on Windows), breaking the build.
build_src_flags =
	-iquote src
	-iquote src/features/usage

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0

; ---------------------------------------------------------------------------
; USB-only custom clock used for this hardware revision. It deliberately
; compiles a single, small source file: no WiFi, web portal, OTA, or external
; services. Configuration is performed over the onboard CH340 serial bridge.
; Keep upload speed conservative because this unit's USB serial link became
; unreliable at 460800 while reading the original flash.
; ---------------------------------------------------------------------------
[env:clock_usb]
platform = espressif8266
board = esp12e
framework = arduino
board_build.ldscript = eagle.flash.4m1m.ld
board_build.filesystem = littlefs
build_src_filter = -<*> +<usb_clock.cpp>
build_flags =
	-D SMALLTV_ESP8266
lib_deps =
	moononournation/GFX Library for Arduino @ ^1.5.0
monitor_speed = 115200
upload_speed = 115200

; One firmware image ships all features; you switch between them in the web
; UI. The WITH_TICKER/WITH_USAGE/WITH_RADAR flags exist for optional local slim
; builds (add e.g. -D WITH_RADAR=0) but no separate images are published.

; ---------------------------------------------------------------------------
; Minimal OTA loader (src/loader.cpp). A tiny WiFi + web-OTA image, small
; enough to slip through a stock firmware whose updater rejects the full image
; for lack of space (e.g. the GeekMagic SmallTV-ultra). Flash it over the stock
; OTA, then flash the real firmware over the loader's /update. Pass WiFi at
; build time: -DLOADER_SSID='"MyNet"' -DLOADER_PASS='"secret"' (else it opens a
; SmallTV-Loader AP). build_src_filter compiles ONLY the loader.
; ---------------------------------------------------------------------------
[env:smalltv_ultra_loader]
platform = espressif8266
board = esp12e
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
	-D LOADER_BUILD
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
build_src_filter = -<*> +<loader.cpp>
